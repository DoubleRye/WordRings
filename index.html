function tryGenerate(hardMode) {
  const pool = hardMode
    ? [...CORE_ARRAY, ...HARD_ARRAY].map(w => w.toLowerCase())
    : CORE_ARRAY.map(w => w.toLowerCase());
  const poolSet = new Set(pool);
  const n = pool.length;
  for (let attempt = 0; attempt < 3000; attempt++) {
    const q0 = pool[Math.floor(Math.random() * n)];
    const q1 = pool[Math.floor(Math.random() * n)];
    const q2 = pool[Math.floor(Math.random() * n)];
    let candidates = null;
    let ok = true;
    for (let r = 0; r < 4; r++) {
      const validChars = PREFIX3[q0[r] + q1[r] + q2[r]];
      if (!validChars) { ok = false; break; }
      let rowCands = new Set();
      for (const c of validChars) {
        for (const w of (POS_IDX[r][c] || [])) rowCands.add(w);
      }
      candidates = candidates === null ? rowCands : new Set([...candidates].filter(w => rowCands.has(w)));
      if (candidates.size === 0) { ok = false; break; }
    }
    if (!ok || !candidates || candidates.size === 0) continue;
    const q3pool = [...candidates].filter(w => poolSet.has(w));
    if (q3pool.length === 0) continue;
    const q3 = q3pool[Math.floor(Math.random() * q3pool.length)];
    const spokes = [q0, q1, q2, q3];
    return Array.from({length:4}, (_,r) => spokes.map(q => q[r]));
  }
  return null;
}

    const hidden = new Set(), rc = [0,0,0,0], qc = [0,0,0,0];
    const cells = [];
    for (let r = 0; r < 4; r++) for (let q = 0; q < 4; q++) cells.push([r,q]);
    for (let i = cells.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [cells[i],cells[j]] = [cells[j],cells[i]];
    }
    for (const [r,q] of cells) {
      if (rc[r]<2 && qc[q]<2) { hidden.add(`${r},${q}`); rc[r]++; qc[q]++; }
    }
    if (hidden.size===8) return hidden;
  }
  return new Set(["0,0","0,2","1,1","1,3","2,0","2,2","3,1","3,3"]);
}

function polarToCart(cx, cy, r, angleDeg) {
  const rad = (angleDeg - 90) * (Math.PI / 180);
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}
function arcPath(cx, cy, innerR, outerR, startAngle, endAngle) {
  const s1=polarToCart(cx,cy,innerR,startAngle), e1=polarToCart(cx,cy,innerR,endAngle);
  const s2=polarToCart(cx,cy,outerR,startAngle), e2=polarToCart(cx,cy,outerR,endAngle);
  return `M ${s2.x} ${s2.y} A ${outerR} ${outerR} 0 0 1 ${e2.x} ${e2.y} L ${e1.x} ${e1.y} A ${innerR} ${innerR} 0 0 0 ${s1.x} ${s1.y} Z`;
}

function WordRings() {
  const [grid, setGrid] = useState(null);
  const [hidden, setHidden] = useState(null);
  const [playerGrid, setPlayerGrid] = useState(null);
  const [selectedCell, setSelectedCell] = useState(null);
  const [gameState, setGameState] = useState("playing");
  const [message, setMessage] = useState("");
  const [revealWords, setRevealWords] = useState(false);
  const [errorCells, setErrorCells] = useState(new Set());
  const [showSolveConfirm, setShowSolveConfirm] = useState(false);
  const [hardMode, setHardMode] = useState(false);

  const initGame = useCallback(() => {
    const g = tryGenerate(hardMode);
    if (!g) { setMessage("Could not generate puzzle — please try again."); setGrid(null); return; }
    const h = chooseHidden();
    const pg = g.map((row, r) => row.map((letter, q) => h.has(`${r},${q}`) ? "" : letter));
    setGrid(g); setHidden(h); setPlayerGrid(pg);
    setSelectedCell(null); setGameState("playing");
    setMessage(""); setRevealWords(false); setErrorCells(new Set()); setShowSolveConfirm(false);
  }, [hardMode]);

  useEffect(() => { initGame(); }, [initGame]);

  const revalidate = (pg) => {
    const errs = new Set();
    // Only flag a ring as invalid when ALL 4 cells are filled
    for (let ri = 0; ri < 4; ri++) {
      if (pg[ri].every(c => c !== "") && !validRing(pg[ri].join("")))
        for (let qq = 0; qq < 4; qq++) if (hidden.has(`${ri},${qq}`)) errs.add(`${ri},${qq}`);
    }
    // Only flag a spoke as invalid when ALL 4 cells are filled
    for (let qi = 0; qi < 4; qi++) {
      if (pg[0][qi] !== "" && pg[1][qi] !== "" && pg[2][qi] !== "" && pg[3][qi] !== "") {
        const spoke = pg[0][qi] + pg[1][qi] + pg[2][qi] + pg[3][qi];
        if (!validSpoke(spoke))
          for (let rr = 0; rr < 4; rr++) if (hidden.has(`${rr},${qi}`)) errs.add(`${rr},${qi}`);
      }
    }
    setErrorCells(errs);
  };

  const handleCellTap = (r, q) => {
    if (gameState !== "playing" || !hidden.has(`${r},${q}`)) return;
    if (selectedCell && selectedCell.r === r && selectedCell.q === q) {
      setSelectedCell(null); // tap same cell → deselect, dismiss keyboard
    } else {
      setSelectedCell({r, q}); // tap new cell → switch selection, keyboard stays
    }
  };

  const handleKeyPress = (letter) => {
    if (!selectedCell) return;
    const {r, q} = selectedCell;
    const ng = playerGrid.map(row => [...row]);
    ng[r][q] = letter.toLowerCase();
    setPlayerGrid(ng); setSelectedCell(null); revalidate(ng);
    if (ng.every(row => row.every(c => c !== ""))) {
      if (ng.every((row,ri) => row.every((c,qi) => c === grid[ri][qi]))) {
        setGameState("won"); setMessage("Brilliant! You solved it!"); setRevealWords(true); setErrorCells(new Set());
      } else {
        const altOk = ng.every(row => validRing(row.join(""))) &&
          [0,1,2,3].every(qi => validSpoke(ng[0][qi]+ng[1][qi]+ng[2][qi]+ng[3][qi]));
        if (altOk) { setGameState("won"); setMessage("Incredible — an alternate solution!"); setRevealWords(true); setErrorCells(new Set()); }
        else setMessage("Not quite — keep going!");
      }
    } else setMessage("");
  };

  const handleClear = () => {
    if (!selectedCell) return;
    const {r, q} = selectedCell;
    const ng = playerGrid.map(row => [...row]);
    ng[r][q] = ""; setPlayerGrid(ng); setSelectedCell(null); setMessage(""); revalidate(ng);
  };

  if (!grid || !playerGrid) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#f7f8fc 0%,#eef0f6 50%,#f8f6f2 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"Georgia,serif",color:"#2a3040"}}>
      <div style={{fontSize:30,fontWeight:700,letterSpacing:6,color:"#3a5a8a",textTransform:"uppercase"}}>Word Rings</div>
      <div style={{marginTop:24,fontSize:14,color:"#8a96a8",letterSpacing:2,fontFamily:"sans-serif"}}>{message||"GENERATING PUZZLE…"}</div>
      {message&&<button onClick={initGame} style={{marginTop:20,background:"#fff",border:"1.5px solid #c0c8d8",borderRadius:10,color:"#5a6a82",fontSize:12,letterSpacing:3,padding:"10px 20px",cursor:"pointer",fontFamily:"Georgia,serif",textTransform:"uppercase",fontWeight:600}}>Try Again</button>}
    </div>
  );

  const size=340, cx=size/2, cy=size/2;
  const ringRadii=[44,77,110,142], ringInner=[28,60,93,126], ringOuter=[60,93,126,159];
  const quadAngles=[45,135,225,315], quadStart=[0,90,180,270];
  const bandColors=["#dce4f0","#edf1f7","#dce4f0","#edf1f7"];
  const isWon = gameState==="won";
  const kbRows=[["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["Z","X","C","V","B","N","M"]];

  function getRingWord(r) {
    const raw=playerGrid[r].join("").toLowerCase();
    for (let i=0; i<4; i++) {
      const rot=raw.slice(i)+raw.slice(0,i);
      if (WORD_SET.has(rot)) return rot.toUpperCase();
      if (WORD_SET.has(rev(rot))) return rev(rot).toUpperCase();
    }
    return playerGrid[r].join("");
  }
  function getSpokeWord(q) { return (playerGrid[0][q]+playerGrid[1][q]+playerGrid[2][q]+playerGrid[3][q]).toUpperCase(); }

  // Responsive board size: use viewport width minus padding, capped at 380px
  const boardSize = Math.min(size, typeof window !== "undefined" ? window.innerWidth - 24 : size);
  const bScale = boardSize / size;
  const bCx = boardSize/2, bCy = boardSize/2;
  function bPolar(r, a) { const rad=(a-90)*Math.PI/180; return {x:bCx+r*bScale*Math.cos(rad),y:bCy+r*bScale*Math.sin(rad)}; }
  function bArc(iR,oR,sA,eA) {
    const s1=bPolar(iR,sA),e1=bPolar(iR,eA),s2=bPolar(oR,sA),e2=bPolar(oR,eA);
    return `M ${s2.x} ${s2.y} A ${oR*bScale} ${oR*bScale} 0 0 1 ${e2.x} ${e2.y} L ${e1.x} ${e1.y} A ${iR*bScale} ${iR*bScale} 0 0 0 ${s1.x} ${s1.y} Z`;
  }

  return (
    <div style={{height:"100vh",background:"linear-gradient(160deg,#f7f8fc 0%,#eef0f6 50%,#f8f6f2 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"space-between",fontFamily:"Georgia,serif",color:"#2a3040",padding:"env(safe-area-inset-top,12px) 0 env(safe-area-inset-bottom,16px)",userSelect:"none",WebkitUserSelect:"none",overflow:"hidden"}}>

      {/* ── TOP: title + subtitle ── */}
      <div style={{textAlign:"center",padding:"0 16px",marginTop:6}}>
        <h1 style={{fontSize:30,fontWeight:700,letterSpacing:6,color:"#3a5a8a",margin:0,textTransform:"uppercase"}}>Word Rings</h1>
        <div style={{fontSize:13,letterSpacing:0.8,color:"#8a96a8",marginTop:5,fontFamily:"sans-serif",maxWidth:360,textAlign:"center",lineHeight:1.5}}>Replace the dots with letters so each ring and each quadrant holds a four‑letter word (read in order in any direction)</div>
      </div>

      {/* ── MIDDLE: hard mode toggle + board ── */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1,justifyContent:"center",gap:10}}>
        <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",userSelect:"none"}}>
          <input type="checkbox" checked={hardMode} onChange={e=>setHardMode(e.target.checked)} style={{width:14,height:14,accentColor:"#6a4ab8",cursor:"pointer"}}/>
          <span style={{fontSize:12,fontFamily:"sans-serif",color:hardMode?"#6a4ab8":"#8a96a8",fontWeight:600,letterSpacing:0.5}}>Hard Mode</span>
        </label>

        <div style={{position:"relative",width:boardSize,height:boardSize}}>
          <svg viewBox={`0 0 ${boardSize} ${boardSize}`} width={boardSize} height={boardSize}>
            <defs><filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" floodColor="#00000012"/></filter></defs>
            <circle cx={bCx} cy={bCy} r={161*bScale} fill="#fafbfd" stroke="#c8d0dc" strokeWidth={1.5} filter="url(#shadow)"/>
            {[3,2,1,0].map(r=><circle key={r} cx={bCx} cy={bCy} r={(ringInner[r]+ringOuter[r])/2*bScale} fill="none" stroke={bandColors[r]} strokeWidth={(ringOuter[r]-ringInner[r])*bScale}/>)}
            {[...ringInner,...ringOuter].map((r,i)=><circle key={i} cx={bCx} cy={bCy} r={r*bScale} fill="none" stroke="#c0c8d6" strokeWidth={0.5}/>)}
            {[0,90,180,270].map(angle=>{const o=bPolar(159,angle),p=bPolar(28,angle);return <line key={angle} x1={p.x} y1={p.y} x2={o.x} y2={o.y} stroke="#4a5a72" strokeWidth={2.5} strokeLinecap="round"/>;}) }
            {Array.from({length:4},(_,r)=>Array.from({length:4},(_,q)=>{
              const isH=hidden.has(`${r},${q}`), isSel=selectedCell&&selectedCell.r===r&&selectedCell.q===q;
              const letter=playerGrid[r][q], pos=bPolar(ringRadii[r],quadAngles[q]);
              const isErr=errorCells.has(`${r},${q}`);
              const tc=!isH?"#1a7a3a":isErr?"#cc2222":"#2a5080", fw=!isH?900:500;
              return <g key={`${r}-${q}`}>
                <path d={bArc(ringInner[r],ringOuter[r],quadStart[q],quadStart[q]+90)} fill={isSel?"rgba(220,190,80,0.28)":"transparent"} stroke={isSel?"#b8960a":"transparent"} strokeWidth={isSel?2:0} style={{cursor:isH&&gameState==="playing"?"pointer":"default"}} onClick={()=>handleCellTap(r,q)}/>
                {letter?<text x={pos.x} y={pos.y} textAnchor="middle" dominantBaseline="central" fill={tc} fontSize={Math.round(18*bScale)} fontWeight={fw} fontFamily="Georgia,serif" style={{pointerEvents:"none"}}>{letter.toUpperCase()}</text>
                  :(isH&&gameState==="playing"&&<circle cx={pos.x} cy={pos.y} r={3*bScale} fill="#b8c6d8" style={{pointerEvents:"none"}}/>)}
              </g>;
            }))}
            <circle cx={bCx} cy={bCy} r={26*bScale} fill={isWon?"#ddf0df":"#f0f3f8"} stroke="#4a5a72" strokeWidth={2}/>
            {isWon&&<text x={bCx} y={bCy} textAnchor="middle" dominantBaseline="central" fill="#1a7a3a" fontSize={Math.round(18*bScale)} fontFamily="Georgia,serif" fontWeight={700}>✦</text>}
          </svg>

          {selectedCell&&gameState==="playing"&&(
            <div style={{position:"fixed",bottom:0,left:0,right:0,display:"flex",justifyContent:"center",zIndex:10}}>
              <div style={{background:"rgba(255,255,255,0.97)",borderRadius:"14px 14px 0 0",padding:"4px 10px 8px",border:"1px solid #d0d8e4",boxShadow:"0 -4px 24px rgba(0,0,0,0.13)",maxWidth:360,width:"95%"}}>
                {kbRows.map((row,ri)=>(
                  <div key={ri} style={{display:"flex",justifyContent:"center",gap:4,marginBottom:ri<2?5:0}}>
                    {row.map(l=><button key={l} onClick={()=>handleKeyPress(l)} style={{width:31,height:40,background:"#eef1f6",border:"1px solid #d0d8e4",borderRadius:7,color:"#2a3650",fontSize:15,fontWeight:600,fontFamily:"Georgia,serif",cursor:"pointer"}} onPointerDown={e=>{e.currentTarget.style.background="#d0daea";}} onPointerUp={e=>{e.currentTarget.style.background="#eef1f6";}} onPointerLeave={e=>{e.currentTarget.style.background="#eef1f6";}}>{l}</button>)}
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"center",gap:16,marginTop:8}}>
                  <button onClick={handleClear} style={{background:"#fff0f0",border:"1px solid #e0c0c0",borderRadius:6,color:"#aa4444",padding:"4px 14px",fontSize:11,cursor:"pointer",letterSpacing:2,fontFamily:"sans-serif",fontWeight:600}}>CLEAR</button>
                  <button onClick={()=>setSelectedCell(null)} style={{background:"none",border:"none",color:"#8a96a8",fontSize:11,cursor:"pointer",letterSpacing:2,fontFamily:"sans-serif"}}>CANCEL</button>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── BOTTOM: message + reveal words + buttons ── */}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,width:"100%",paddingBottom:4}}>
        {message&&<div style={{fontSize:15,fontWeight:600,color:isWon?"#1a7a3a":"#b87a30",textAlign:"center",padding:"0 24px"}}>{message}</div>}

        {revealWords&&(
          <div style={{display:"flex",gap:20,flexWrap:"wrap",justifyContent:"center"}}>
            {[["RINGS",getRingWord],["SPOKES",getSpokeWord]].map(([label,fn])=>(
              <div key={label} style={{textAlign:"center"}}>
                <div style={{fontSize:10,color:"#8a96a8",letterSpacing:2,marginBottom:4,fontFamily:"sans-serif"}}>{label}</div>
                <div style={{display:"flex",gap:6}}>{[0,1,2,3].map(i=><span key={i} style={{fontSize:13,color:"#1a6a3a",background:"#d4ecd8",padding:"3px 8px",borderRadius:6,letterSpacing:1,fontWeight:600}}>{fn(i)}</span>)}</div>
              </div>
            ))}
          </div>
        )}

        <div style={{display:"flex",gap:12}}>
          {gameState==="playing"&&<button onClick={()=>setShowSolveConfirm(true)} style={{background:"#fff",border:"1.5px solid #d0c0c0",borderRadius:10,color:"#996666",fontSize:12,letterSpacing:3,padding:"10px 20px",cursor:"pointer",fontFamily:"Georgia,serif",textTransform:"uppercase",fontWeight:600,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>Solve</button>}
          <button onClick={initGame} style={{background:isWon||gameState==="solved"?"#d4ecd8":"#fff",border:`1.5px solid ${isWon||gameState==="solved"?"#8abf94":"#c0c8d8"}`,borderRadius:10,color:isWon||gameState==="solved"?"#1a6a3a":"#5a6a82",fontSize:12,letterSpacing:3,padding:"10px 20px",cursor:"pointer",fontFamily:"Georgia,serif",textTransform:"uppercase",fontWeight:600,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>New Puzzle</button>
        </div>
      </div>

      {showSolveConfirm&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}} onClick={()=>setShowSolveConfirm(false)}>
          <div style={{background:"#fff",borderRadius:16,padding:"28px 32px",boxShadow:"0 8px 40px rgba(0,0,0,0.15)",textAlign:"center",maxWidth:300,width:"85%"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:17,fontWeight:600,color:"#2a3040",marginBottom:20,fontFamily:"Georgia,serif"}}>Are you sure you want to give up?</div>
            <div style={{display:"flex",gap:12,justifyContent:"center"}}>
              <button onClick={()=>{setPlayerGrid(grid.map(row=>[...row]));setGameState("solved");setMessage("Puzzle solved.");setRevealWords(true);setErrorCells(new Set());setSelectedCell(null);setShowSolveConfirm(false);}} style={{background:"#fee",border:"1.5px solid #d4a0a0",borderRadius:8,color:"#993333",fontSize:14,fontWeight:600,padding:"8px 24px",cursor:"pointer",fontFamily:"Georgia,serif"}}>Yes</button>
              <button onClick={()=>setShowSolveConfirm(false)} style={{background:"#eef1f6",border:"1.5px solid #c0c8d8",borderRadius:8,color:"#3a5a8a",fontSize:14,fontWeight:600,padding:"8px 24px",cursor:"pointer",fontFamily:"Georgia,serif"}}>No</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<WordRings />);
  </script>
</body>
</html>
